version: '3.9'

services:
  # ─── Core API ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://frank:frank@postgres:5432/frankdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - frank-net

  # ─── Worker (Celery) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q daily,weekly,monthly,alerts,actions
    environment:
      - DATABASE_URL=postgresql+asyncpg://frank:frank@postgres:5432/frankdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - frank-net

  # ─── Celery Beat (Scheduler) ────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://frank:frank@postgres:5432/frankdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - frank-net

  # ─── Flower (Celery Monitor) ────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank-flower
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - frank-net

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: frank-postgres
    environment:
      POSTGRES_DB: frankdb
      POSTGRES_USER: frank
      POSTGRES_PASSWORD: frank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frank -d frankdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - frank-net

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: frank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - frank-net

  # ─── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: frank-airflow-web
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://frank:frank@postgres:5432/frankdb
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/2
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://frank:frank@postgres:5432/frankdb
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-zDXRhNL2a8YhT0IKkQRpNGLLHpU_a9bBKE1a0Tl7sFo=}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-frank-ai-os-secret}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - frank-net

volumes:
  postgres_data:
  redis_data:
  airflow_logs:

networks:
  frank-net:
    driver: bridge
