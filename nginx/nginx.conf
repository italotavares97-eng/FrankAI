# =============================================================================
# NGINX/NGINX.CONF — Frank AI OS
# Reverse proxy + SSL termination para produção
# =============================================================================
# Profiles: production
# Uso: docker compose --profile production up -d
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript;

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=ask_limit:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---------------------------------------------------------------------------
    # Upstream — Frank API
    # ---------------------------------------------------------------------------
    upstream frank_api {
        server frank:8000;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS — API principal
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name frank.davverogelato.com.br;

        # SSL
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Buffer size
        client_max_body_size 10m;
        client_body_buffer_size 128k;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # ---------------------------------------------------------------------------
        # /ask — rate limit rigoroso (LLM inference)
        # ---------------------------------------------------------------------------
        location /ask {
            limit_req zone=ask_limit burst=5 nodelay;
            limit_conn conn_limit 10;

            proxy_pass         http://frank_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # /stream — SSE, sem timeout de leitura rígido
        location /stream {
            limit_req zone=ask_limit burst=3 nodelay;

            proxy_pass          http://frank_api;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";
            proxy_read_timeout  300s;
            proxy_buffering     off;
            proxy_cache         off;
            chunked_transfer_encoding on;
        }

        # WhatsApp webhook
        location /webhooks/whatsapp {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass         http://frank_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # API geral
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://frank_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Cache de health check
            location /health {
                proxy_pass http://frank_api;
                proxy_cache_valid 200 10s;
                access_log off;
            }
        }
    }
}
