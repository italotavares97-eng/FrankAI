# =============================================================================
# DOCKER COMPOSE — Frank AI OS
# Davvero Gelato · Infraestrutura Completa
# =============================================================================
# Uso:
#   docker compose up -d          # Sobe tudo em background
#   docker compose logs -f frank  # Acompanha logs da API
#   docker compose down -v        # Para e remove volumes
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # FRANK API — FastAPI principal (orquestrador de agentes)
  # ---------------------------------------------------------------------------
  frank:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_URL=postgresql://frank:${POSTGRES_PASSWORD}@postgres:5432/davvero
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://frank:${RABBITMQ_PASSWORD}@rabbitmq:5672/davvero
      - ENV=production
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./lessons.md:/app/lessons.md
      - ./logs:/app/logs
    networks:
      - frank_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # FRANK WORKER — Processa tarefas assíncronas via RabbitMQ
  # ---------------------------------------------------------------------------
  frank_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: frank_worker
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_URL=postgresql://frank:${POSTGRES_PASSWORD}@postgres:5432/davvero
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://frank:${RABBITMQ_PASSWORD}@rabbitmq:5672/davvero
      - WORKER_CONCURRENCY=4
    depends_on:
      - frank
      - rabbitmq
    volumes:
      - ./lessons.md:/app/lessons.md
      - ./logs:/app/logs
    networks:
      - frank_net
    deploy:
      replicas: 2

  # ---------------------------------------------------------------------------
  # FRANK SCHEDULER — Cron de tarefas periódicas (relatórios, alertas)
  # ---------------------------------------------------------------------------
  frank_scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frank_scheduler
    restart: unless-stopped
    command: ["python", "-m", "scheduler.main"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_URL=postgresql://frank:${POSTGRES_PASSWORD}@postgres:5432/davvero
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://frank:${RABBITMQ_PASSWORD}@rabbitmq:5672/davvero
    depends_on:
      - frank
    networks:
      - frank_net

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Banco de dados principal
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: frank_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=davvero
      - POSTGRES_USER=frank
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=pt_BR.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    networks:
      - frank_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frank -d davvero"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=500

  # ---------------------------------------------------------------------------
  # REDIS — Cache, sessões e pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: frank_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - frank_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # RABBITMQ — Fila de tarefas assíncronas (MODO EXECUÇÃO)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: frank_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI → http://localhost:15672
    environment:
      - RABBITMQ_DEFAULT_USER=frank
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=davvero
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - frank_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # PGADMIN — Interface gráfica para o PostgreSQL (dev/ops)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: frank_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@davvero.com.br}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - frank_net
    profiles:
      - tools

  # ---------------------------------------------------------------------------
  # NGINX — Reverse proxy e SSL termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: frank_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frank
    networks:
      - frank_net
    profiles:
      - production

# -----------------------------------------------------------------------------
# VOLUMES
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  pgadmin_data:
    driver: local

# -----------------------------------------------------------------------------
# NETWORKS
# -----------------------------------------------------------------------------
networks:
  frank_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
